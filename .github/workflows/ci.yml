name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-staging:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations (staging)
        if: ${{ secrets.STAGING_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npm run prisma:migrate --workspace backend

      - name: Deploy to staging
        run: echo "Deploying staging environment after PR merge to main"

  deploy-production:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations (production)
        if: ${{ secrets.PROD_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npm run prisma:migrate --workspace backend

      - name: Deploy to production
        run: echo "Deploying production release"

      - name: Rollback strategy hook
        if: failure()
        run: echo "Trigger rollback runbook and redeploy previous stable release"
